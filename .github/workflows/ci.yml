name: CI
on:
  push:

jobs:
  build:
    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRATION_MS: ${{ secrets.JWT_EXPIRATION_MS }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: loan-system
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 2202295
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 6s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4   # this line means "clone my repository"
      - uses: actions/setup-java@v4 # this line = "sudo apt install java"
        with:
          distribution: temurin
          java-version: 21
      - run: mvn clean verify
      - run: |
          echo "DB_URL=$DB_URL"
          echo "DB_USER=$DB_USER"